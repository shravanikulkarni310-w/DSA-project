<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DSA Array Visualizer</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->

    <header>

        <div class="logo">
            <i class="fa-solid fa-chart-simple"></i>
            Array Visualizer
        </div>

        <div class="theme-btn">
            <i class="fa-solid fa-moon"></i>
        </div>

    </header>


    <main>

        <!-- Left Panel -->

        <section class="control-panel">

            <h2>Array Operations</h2>

            <div class="control-box">

                <label>Create Array</label>

                <input type="text"
                    id="inputArray"
                    placeholder="Example : 10,25,15,40">

                <button onclick="createArray()">
                    <i class="fa-solid fa-plus"></i>
                    Create
                </button>

                <button class="random-btn"
                    onclick="generateRandomArray()">

                    <i class="fa-solid fa-dice"></i>

                    Random

                </button>

            </div>


            <div class="control-box">

                <label>Insert Element</label>

                <input type="number"
                    id="insertValue"
                    placeholder="Value">

                <input type="number"
                    id="insertIndex"
                    placeholder="Index">

                <button class="insert-btn"
                    onclick="insertAtIndex()">

                    Insert

                </button>

            </div>


            <div class="control-box">

                <label>Delete Element</label>

                <input type="number"
                    id="deleteIndex"
                    placeholder="Index">

                <button class="delete-btn"
                    onclick="deleteAtIndex()">

                    Delete

                </button>

            </div>


            <!-- Center Buttons -->

            <div class="center-buttons">

                <button class="reverse-btn"
                    onclick="reverseArray()">

                    <i class="fa-solid fa-repeat"></i>

                    Reverse

                </button>

                <button class="reset-btn"
                    onclick="resetArray()">

                    <i class="fa-solid fa-trash"></i>

                    Reset

                </button>

            </div>

        </section>


        <!-- Right Panel -->

        <section class="visualizer">

            <!-- Statistics -->

            <div class="stats">

                <div class="card">

                    <i class="fa-solid fa-database"></i>

                    <h3>Array Size</h3>

                    <p id="arraySize">0</p>

                </div>

                <div class="card">

                    <i class="fa-solid fa-clock"></i>

                    <h3>Complexity</h3>

                    <p id="complexity">-</p>

                </div>

                <div class="card speed-card">

                    <i class="fa-solid fa-gauge-high"></i>

                    <h3>Animation Speed</h3>

                    <input type="range"
                        id="speedRange"
                        min="100"
                        max="1000"
                        value="500">

                </div>

            </div>


            <!-- Array -->

            <div class="array-section">

                <h2>Array Visualization</h2>

                <div id="arrayContainer">

                </div>

            </div>



        </section>

    </main>

    <!-- Toast -->

    <div id="toast"></div>

    <script src="script.js"></script>

</body>

</html>
